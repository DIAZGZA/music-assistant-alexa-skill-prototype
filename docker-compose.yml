services:
  music-assistant-skill:
    image: ghcr.io/alams154/music-assistant-skill:latest
    environment:
      - SKILL_HOSTNAME=<hostname> #required
      - MA_HOSTNAME=homeassistantPi #optional, if only using APL devices
      - APP_USERNAME=/run/secrets/APP_USERNAME #optional
      - APP_PASSWORD=/run/secrets/APP_PASSWORD #optional
      - PORT=5000 #optional
      - DEBUG_PORT=5678 #optional
      - LOCALE=es-ES # optional: skill locale (e.g. en-US, en-GB, de-DE)
      - AWS_DEFAULT_REGION=eu-west-1 #optional
      - TZ=Europe/Madrid # set container timezone (override as needed)
    secrets:
      - APP_USERNAME
      - APP_PASSWORD
    ports:
      - 5000:5000 # Must match PORT
      - 5678:5678 # Must match DEBUG_PORT #optional
    volumes:
      - ./ask_data:/root/.ask
    restart: no

secrets:
  APP_USERNAME:
    file: ./secrets/app_username.txt
  APP_PASSWORD:
    file: ./secrets/app_password.txt
